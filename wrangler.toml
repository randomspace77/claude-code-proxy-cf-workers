#:schema node_modules/wrangler/config-schema.json
name = "claude-code-proxy-cf-workers"
main = "src/index.ts"
compatibility_date = "2026-04-10"
compatibility_flags = ["nodejs_compat"]

# Preserve Dashboard-configured variables across deployments.
# Without this, `wrangler deploy` would clear all vars not in [vars].
keep_vars = true

# Observability — enable logs for debugging via Dashboard or `wrangler tail`
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

# ============================================================
# All configuration is done via Cloudflare Dashboard or `wrangler secret put`.
# Do NOT add [vars] here — they would overwrite Dashboard settings on every deploy.
# Defaults are handled in src/config.ts.
#
# Dashboard → Settings → Variables and Secrets:
#
#   PROVIDERS              (JSON string — multi-provider mode config, see README)
#                          Example: {"default":"opencode","routing":{"minimax*":"opencode-pt"},"providers":{"opencode":{},"opencode-pt":{"baseUrl":"https://opencode.ai/zen/go/v1","protocol":"anthropic"}}}
#
#   LOG_LEVEL              (default: WARNING, set to DEBUG for troubleshooting)
#   MAX_TOKENS_LIMIT       (default: 16384)
#   MIN_TOKENS_LIMIT       (default: 4096)
#   REQUEST_TIMEOUT        (default: 90)
#
# Legacy mode vars (only when PROVIDERS is not set):
#   OPENAI_BASE_URL        (default: https://api.openai.com/v1)
#   BIG_MODEL              (default: gpt-4o)
#   MIDDLE_MODEL           (default: same as BIG_MODEL)
#   SMALL_MODEL            (default: gpt-4o-mini)
#   PASSTHROUGH_MODELS     (comma-separated model prefixes for Anthropic passthrough)
#   ENABLE_MODEL_MAPPING   (set to "true" to enable Claude→provider model mapping)
#
# Secrets (use `wrangler secret put <KEY>` or Dashboard):
#   ANTHROPIC_API_KEY      (proxy auth — clients must send this key to access proxy)
#   PROVIDER_<NAME>_API_KEY (per-provider API keys, e.g. PROVIDER_OPENCODE_API_KEY)
#   OPENAI_API_KEY         (legacy mode only)
# ============================================================
